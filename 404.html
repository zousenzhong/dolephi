<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 - Dolephi</title>
<meta name="robots" content="noindex">
<style>
:root{--blue:#3D8B5C;--blue-d:#256B43;--blue-l:#E6F4EA;--steel:#2C3E50;--white:#fff;--max:1200px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;color:var(--steel);line-height:1.6;background:var(--white);display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
.wrap{max-width:var(--max);margin:0 auto}
.code{font-size:120px;font-weight:800;color:var(--blue);line-height:1;letter-spacing:-4px}
.msg{font-size:20px;color:var(--steel);margin:16px 0 8px;font-weight:600}
.desc{font-size:15px;color:#7a8a9a;margin-bottom:28px}
.btn{display:inline-block;padding:12px 32px;background:var(--blue);color:var(--white);text-decoration:none;border-radius:8px;font-size:15px;font-weight:600;transition:background .2s}
.btn:hover{background:var(--blue-d)}
</style>
</head>
<body>
<div class="wrap">
<div class="code">404</div>
<div class="msg" id="msg">Page Not Found</div>
<div class="desc" id="desc">The page you are looking for does not exist or has been moved.</div>
<a href="/" class="btn" id="btn">Back to Home</a>
</div>
<script src="/i18n.js"></script>
<script src="/i18n-extra.js"></script>
<script>
(function(){
var lang=(localStorage.getItem('dolephi_lang')||navigator.language||'en').slice(0,2).toLowerCase();
var t=window.I18N&&window.I18N[lang]?window.I18N[lang]:window.I18N&&window.I18N['en']?window.I18N['en']:{};
if(t.err404_msg)document.getElementById('msg').textContent=t.err404_msg;
if(t.err404_desc)document.getElementById('desc').textContent=t.err404_desc;
if(t.err404_btn)document.getElementById('btn').textContent=t.err404_btn;
})();
</script>
</body>
</html>
