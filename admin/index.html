<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Manager | Dolephi</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#E6F4EA}
.nc-loading{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
.nc-loading p{color:#256B43;font-size:14px;font-weight:500}
.nc-loading .spinner{width:40px;height:40px;border:3px solid #D4ECDB;border-top-color:#3D8B5C;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="nc-root">
<div class="nc-loading">
<div class="spinner"></div>
<p>Loading Dolephi CMS...</p>
</div>
</div>
<script src="https://unpkg.com/decap-cms@3.4.0/dist/decap-cms.js"></script>
</body>
</html>
