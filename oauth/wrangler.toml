# Cloudflare Worker 配置 — Decap CMS OAuth 代理
# 文档: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "dolephi-oauth"
main = "worker.js"
compatibility_date = "2024-09-01"

# 环境变量 — 部署后在 Cloudflare Dashboard 中设置真实值：
#   Workers & Pages → dolephi-oauth → Settings → Variables and Secrets
#   GITHUB_CLIENT_ID     = 你的 GitHub OAuth Client ID
#   GITHUB_CLIENT_SECRET = 你的 GitHub OAuth Client Secret
#   CMS_URL              = https://dolephi.pages.dev/admin/
#
# 或者取消下面的注释，直接填入（不推荐，明文不安全）：
# [vars]
# GITHUB_CLIENT_ID = "your-client-id"
# GITHUB_CLIENT_SECRET = "your-client-secret"
# CMS_URL = "https://dolephi.pages.dev/admin/"
